# Rate-limiting de nginx para dukecrea.com — se copia a /etc/nginx/conf.d/
# Generoso para no afectar navegación normal; frena floods y fuerza bruta.
limit_req_zone $binary_remote_addr zone=dukecrea_req:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=dukecrea_conn:10m;
limit_req_status 429;
limit_conn_status 429;
